<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencia - Acceso Calendario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); background: white; }
        .btn-login { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; font-weight: bold; padding: 12px; border-radius: 10px; border: none; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h1>🏢</h1>
                            <h3>Portal de Agencias</h3>
                            <p class="text-muted">Acceso al Calendario de Ocupación</p>
                        </div>
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">📧 Email</label>
                                <input type="email" name="email" class="form-control form-control-lg" required autofocus>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">🔒 Contraseña</label>
                                <input type="password" name="password" class="form-control form-control-lg" required>
                            </div>
                            <button type="submit" class="btn btn-login btn-lg">Ver Calendario</button>
                        </form>
                        <div class="text-center mt-3">
                            <small class="text-muted">agencia@demo.com / agencia123</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
