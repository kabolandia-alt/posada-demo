<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Posadas - Elige tu destino</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .header { text-align: center; color: white; padding: 50px 0 30px; }
        .header h1 { font-size: 3em; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .posada-card { background: white; border-radius: 20px; padding: 30px; text-align: center; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; margin-bottom: 20px; text-decoration: none; color: inherit; display: block; }
        .posada-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); color: inherit; }
        .posada-card h3 { color: #2C5F8A; margin: 15px 0; }
        .posada-card .btn { border-radius: 25px; padding: 10px 30px; font-weight: bold; }
        .footer { text-align: center; color: white; padding: 30px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏨 Portal de Posadas</h1>
            <p class="lead">Elige tu destino y encuentra la habitación perfecta</p>
        </div>
        <div class="row justify-content-center" id="lista-posadas">
            <div class="col-12 text-center text-white">
                <div class="spinner-border"></div>
                <p>Cargando posadas disponibles...</p>
            </div>
        </div>
        <div class="footer">
            <p>© 2026 <strong>Nova Tech</strong> - Desarrollado por <strong>José García</strong></p>
        </div>
    </div>
    
    <script>
        fetch('/api/posadas-publicas')
            .then(r => r.json())
            .then(posadas => {
                let html = '';
                if (posadas.length === 0) {
                    html = '<div class="col-12 text-center text-white"><h3>No hay posadas disponibles</h3></div>';
                } else {
                    posadas.forEach(p => {
                        html += `
                            <div class="col-md-6 col-lg-4">
                                <a href="/posada/${p.id}" class="posada-card">
                                    <h1>🏨</h1>
                                    <h3>${p.nombre}</h3>
                                    <p>📍 ${p.direccion || 'Ubicación por definir'}</p>
                                    <p>🛏️ <strong>${p.habitaciones}</strong> habitaciones disponibles</p>
                                    <p>📞 ${p.telefono || 'No disponible'}</p>
                                    <button class="btn btn-primary btn-lg mt-2">Ver Disponibilidad →</button>
                                </a>
                            </div>
                        `;
                    });
                }
                document.getElementById('lista-posadas').innerHTML = html;
            })
            .catch(() => {
                document.getElementById('lista-posadas').innerHTML = 
                    '<div class="col-12 text-center text-white"><h3>Error al cargar posadas</h3></div>';
            });
    </script>
</body>
</html>
