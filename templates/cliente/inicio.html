<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva tu Posada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
    <style>
        :root {
            --primario: #2C5F8A;
            --verde: #51CF66;
            --rojo: #FF6B6B;
            --dorado: #FFD700;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 3em;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .search-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .habitacion-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .habitacion-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .habitacion-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .precio-badge {
            background: var(--verde);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .btn-reservar {
            background: var(--primario);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s;
        }
        
        .btn-reservar:hover {
            background: #1a4a6e;
            transform: scale(1.05);
        }
        
        .servicio-icon {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 3px;
            font-size: 0.85em;
        }
        
        .calendario-mostrar {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .modal-pago {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-pago.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <!-- HEADER -->
        <div class="header">
            <h1>🌴 Posada Paraíso</h1>
            <p class="lead">Encuentra tu escapada perfecta al mejor precio</p>
        </div>
        
        <!-- BUSCADOR -->
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="search-card">
                    <h3 class="text-center mb-4">📅 Selecciona tus fechas</h3>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-md-5">
                            <label class="form-label fw-bold">📥 Check-in</label>
                            <input type="text" id="fechaEntrada" class="form-control form-control-lg" placeholder="Seleccionar fecha" readonly>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label fw-bold">📤 Check-out</label>
                            <input type="text" id="fechaSalida" class="form-control form-control-lg" placeholder="Seleccionar fecha" readonly>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button class="btn btn-reservar w-100" onclick="buscarDisponibilidad()">
                                🔍 Buscar
                            </button>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">👤 Adultos</label>
                            <select id="adultos" class="form-select form-select-lg">
                                <option value="1">1 adulto</option>
                                <option value="2" selected>2 adultos</option>
                                <option value="3">3 adultos</option>
                                <option value="4">4 adultos</option>
                                <option value="5">5 adultos</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">👶 Niños</label>
                            <select id="ninos" class="form-select form-select-lg">
                                <option value="0" selected>Sin niños</option>
                                <option value="1">1 niño</option>
                                <option value="2">2 niños</option>
                                <option value="3">3 niños</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="cargando" class="text-center mt-4" style="display: none;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Buscando...</span>
                        </div>
                        <p class="mt-2">🔍 Buscando las mejores opciones para ti...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- RESULTADOS -->
        <div id="resultados" class="row mt-4"></div>
    </div>
    
    <!-- MODAL DE RESERVA -->
    <div class="modal-pago" id="modalReserva">
        <div class="modal-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>📝 Completar Reserva</h3>
                <button class="btn-close" onclick="cerrarModal()"></button>
            </div>
            
            <div id="resumenHabitacion" class="bg-light p-3 rounded mb-3"></div>
            
            <form id="formReserva">
                <div class="row g-2">
                    <div class="col-12">
                        <label class="form-label">Nombre Completo *</label>
                        <input type="text" id="nombreCliente" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Cédula / Pasaporte *</label>
                        <input type="text" id="cedulaCliente" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Teléfono *</label>
                        <input type="tel" id="telefonoCliente" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input type="email" id="emailCliente" class="form-control">
                    </div>
                </div>
                
                <div class="text-center mt-3">
                    <h4>Total: <span id="totalReserva" class="text-success fw-bold"></span></h4>
                </div>
                
                <button type="submit" class="btn btn-success btn-lg w-100 mt-3">
                    💳 Proceder al Pago
                </button>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script>
        // Configurar calendarios
        const fpEntrada = flatpickr("#fechaEntrada", {
            locale: "es",
            minDate: "today",
            dateFormat: "Y-m-d",
            onChange: function(selectedDates, dateStr) {
                fpSalida.set('minDate', dateStr);
            }
        });
        
        const fpSalida = flatpickr("#fechaSalida", {
            locale: "es",
            minDate: "today",
            dateFormat: "Y-m-d"
        });
        
        let habitacionSeleccionada = null;
        let totalSeleccionado = 0;
        
        function buscarDisponibilidad() {
            const entrada = document.getElementById('fechaEntrada').value;
            const salida = document.getElementById('fechaSalida').value;
            
            if (!entrada || !salida) {
                alert('⚠️ Selecciona fechas de entrada y salida');
                return;
            }
            
            document.getElementById('cargando').style.display = 'block';
            document.getElementById('resultados').innerHTML = '';
            
            fetch(`/api/disponibilidad/1?entrada=${entrada}&salida=${salida}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('cargando').style.display = 'none';
                    
                    let html = '';
                    
                    if (data.length === 0) {
                        html = `
                            <div class="col-12 text-center text-white mt-4">
                                <h3>😔 No hay habitaciones disponibles</h3>
                                <p>Intenta con otras fechas</p>
                            </div>
                        `;
                    } else {
                        html += '<h2 class="text-white text-center mb-4">🏨 Habitaciones Disponibles</h2>';
                        
                        data.forEach(hab => {
                            const imagen = hab.imagen ? `/static/uploads/${hab.imagen}` : 'https://via.placeholder.com/400x250?text=Sin+Imagen';
                            const servicios = hab.servicios.map(s => `<span class="servicio-icon">${s}</span>`).join(' ');
                            
                            html += `
                                <div class="col-md-6 col-lg-4">
                                    <div class="habitacion-card" onclick="abrirReserva(${hab.id}, '${hab.nombre}', ${hab.precio_total}, '${hab.tipo}', '${hab.camas || ''}')">
                                        <img src="${imagen}" alt="${hab.nombre}">
                                        <div class="p-3">
                                            <div class="d-flex justify-content-between align-items-start mb-2">
                                                <h5>${hab.nombre}</h5>
                                                <span class="badge bg-primary">${hab.tipo}</span>
                                            </div>
                                            <p class="text-muted small">${hab.descripcion || ''}</p>
                                            <div class="mb-2">${servicios}</div>
                                            <div class="d-flex justify-content-between align-items-center">
                                                <span class="precio-badge">$${hab.precio_total}</span>
                                                <small class="text-muted">$${hab.precio_por_noche}/noche</small>
                                            </div>
                                            <small class="text-muted">👥 ${hab.capacidad} personas · 🛏️ ${hab.camas || 'Consultar'}</small>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                    }
                    
                    document.getElementById('resultados').innerHTML = html;
                })
                .catch(error => {
                    document.getElementById('cargando').style.display = 'none';
                    alert('❌ Error al buscar disponibilidad');
                });
        }
        
        function abrirReserva(id, nombre, precio, tipo, camas) {
            habitacionSeleccionada = id;
            totalSeleccionado = precio;
            
            document.getElementById('resumenHabitacion').innerHTML = `
                <strong>${nombre}</strong><br>
                <small>Tipo: ${tipo} · Camas: ${camas}</small>
            `;
            document.getElementById('totalReserva').textContent = `$${precio}`;
            document.getElementById('modalReserva').classList.add('active');
        }
        
        function cerrarModal() {
            document.getElementById('modalReserva').classList.remove('active');
        }
        
        document.getElementById('formReserva').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                habitacion_id: habitacionSeleccionada,
                fecha_entrada: document.getElementById('fechaEntrada').value,
                fecha_salida: document.getElementById('fechaSalida').value,
                cliente_nombre: document.getElementById('nombreCliente').value,
                cliente_cedula: document.getElementById('cedulaCliente').value,
                cliente_telefono: document.getElementById('telefonoCliente').value,
                cliente_email: document.getElementById('emailCliente').value,
                adultos: document.getElementById('adultos').value,
                ninos: document.getElementById('ninos').value
            };
            
            fetch('/api/reservas', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(data => {
                if (data.reserva_id) {
                    alert('✅ ¡Reserva creada exitosamente!\n\nTotal: $' + data.total + '\n\nTe contactaremos para confirmar el pago.');
                    cerrarModal();
                    document.getElementById('formReserva').reset();
                } else {
                    alert('❌ Error: ' + (data.error || 'Intenta de nuevo'));
                }
            })
            .catch(() => alert('❌ Error de conexión'));
        });
        
        // Cerrar modal al hacer clic fuera
        document.getElementById('modalReserva').addEventListener('click', function(e) {
            if (e.target === this) cerrarModal();
        });
    </script>
</body>
</html>
