<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva - Demo-Posadas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
    <style>
        :root { --primario: #2C5F8A; --verde: #51CF66; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .header { text-align: center; color: white; padding: 30px 0; }
        .header h1 { font-size: 3em; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .search-card { background: white; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); padding: 30px; margin-bottom: 30px; }
        .habitacion-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: transform 0.3s; cursor: pointer; margin-bottom: 20px; }
        .habitacion-card:hover { transform: translateY(-5px); }
        .habitacion-card img { width: 100%; height: 200px; object-fit: cover; }
        .precio-badge { background: var(--verde); color: white; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 1.2em; }
        .btn-reservar { background: var(--primario); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; }
        .servicio-icon { display: inline-block; background: #f0f0f0; padding: 5px 12px; border-radius: 20px; margin: 3px; font-size: 0.85em; }
        .modal-pago { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-pago.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 30px; max-width: 600px; width: 95%; max-height: 85vh; overflow-y: auto; }
        .huesped-card { background: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--primario); }
        .datos-pago { background: #fff3cd; border-radius: 10px; padding: 15px; margin: 15px 0; }
        .localizador-destacado { background: linear-gradient(135deg, #2C5F8A, #1a3a5c); color: white; padding: 15px; border-radius: 15px; text-align: center; margin: 15px 0; font-size: 1.5em; font-family: monospace; letter-spacing: 3px; font-weight: bold; }
        .localizador-info { background: #e8f5e9; border-radius: 10px; padding: 10px; text-align: center; color: #2e7d32; font-weight: bold; margin-top: 10px; }
        @media (max-width: 768px) { .header h1 { font-size: 2em; } .modal-content { padding: 15px; } }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="header"><h1>🌴 Demo-Posadas</h1><p class="lead">Encuentra tu escapada perfecta</p></div>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="search-card">
                    <h3 class="text-center mb-4">📅 Selecciona tus fechas</h3>
                    <div class="row g-3 mb-4">
                        <div class="col-md-5"><label class="form-label fw-bold">📥 Check-in</label><input type="text" id="fechaEntrada" class="form-control form-control-lg" placeholder="Seleccionar fecha" readonly></div>
                        <div class="col-md-5"><label class="form-label fw-bold">📤 Check-out</label><input type="text" id="fechaSalida" class="form-control form-control-lg" placeholder="Seleccionar fecha" readonly></div>
                        <div class="col-md-2 d-flex align-items-end"><button class="btn btn-reservar w-100" onclick="buscarDisponibilidad()">🔍 Buscar</button></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6"><label class="form-label fw-bold">👤 Adultos</label><select id="adultos" class="form-select form-select-lg"><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></div>
                        <div class="col-md-6"><label class="form-label fw-bold">👶 Niños</label><select id="ninos" class="form-select form-select-lg"><option value="0" selected>0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div>
                    </div>
                    <div id="cargando" class="text-center mt-4" style="display:none;"><div class="spinner-border text-primary"></div><p>🔍 Buscando...</p></div>
                </div>
                
                <!-- BUSCADOR DE LOCALIZADOR -->
                <div class="search-card">
                    <h4 class="text-center mb-3">🔍 Consultar mi Reserva</h4>
                    <div class="input-group mb-3">
                        <input type="text" id="buscarLocalizador" class="form-control form-control-lg" placeholder="Ingresa tu localizador (ej: AF36HB)" maxlength="6" style="text-transform: uppercase;">
                        <button class="btn btn-primary btn-lg" onclick="consultarReserva()">🔍 Buscar</button>
                    </div>
                    <div id="resultadoConsulta" style="display:none;"></div>
                </div>
            </div>
        </div>
        <div id="resultados" class="row mt-4"></div>
    </div>
    
    <div class="modal-pago" id="modalReserva">
        <div class="modal-content">
            <div class="d-flex justify-content-between align-items-center mb-3"><h3>📝 Completar Reserva</h3><button class="btn-close" onclick="cerrarModal()"></button></div>
            <div id="resumenHabitacion" class="bg-light p-3 rounded mb-3"></div>
            <div id="localizadorExito" style="display:none;">
                <div class="localizador-destacado">🔑 <span id="localizadorCodigo"></span></div>
                <div class="localizador-info">📌 GUARDA ESTE CÓDIGO - Lo necesitarás para gestionar tu reserva</div>
                <hr>
            </div>
            <form id="formReserva" enctype="multipart/form-data">
                <h5 class="text-primary">👤 Datos del Titular</h5>
                <div class="row g-2 mb-3">
                    <div class="col-12"><input type="text" id="nombreCliente" name="cliente_nombre" class="form-control" placeholder="Nombre Completo *" required></div>
                    <div class="col-md-6"><select id="tipoDocumento" class="form-select" required><option value="cedula">Cédula</option><option value="pasaporte">Pasaporte</option></select></div>
                    <div class="col-md-6"><input type="text" id="cedulaCliente" class="form-control" placeholder="N° Documento *" required></div>
                    <div class="col-md-6"><input type="tel" id="telefonoCliente" name="cliente_telefono" class="form-control" placeholder="Teléfono *" required></div>
                    <div class="col-md-6"><input type="email" id="emailCliente" name="cliente_email" class="form-control" placeholder="Email"></div>
                </div>
                <h5 class="text-primary">👥 Datos de Huéspedes</h5>
                <div id="huespedesContainer"></div>
                <h5 class="text-primary mt-3">💳 Método de Pago</h5>
                <select id="metodoPago" class="form-select mb-3" required onchange="mostrarDatosPago()">
                    <option value="">Seleccionar método</option>
                    <option value="solo_reserva">📝 Solo Reservar (Sin pago - 40 min)</option>
                    <option value="zelle">Zelle</option>
                    <option value="binance">Binance</option>
                    <option value="transferencia">Transferencia Internacional</option>
                    <option value="efectivo">Efectivo (Pago en oficina)</option>
                </select>
                <div id="datosPago" class="datos-pago" style="display:none;"></div>
                <div class="mb-3" id="divComprobante">
                    <label class="form-label">📎 Adjuntar Comprobante <span id="comprobanteRequerido">*</span></label>
                    <input type="file" name="comprobante" id="comprobanteFile" class="form-control" accept="image/*,.pdf" required>
                </div>
                <div class="text-center mt-3"><h4>Total: <span id="totalReserva" class="text-success fw-bold"></span></h4></div>
                <button type="submit" class="btn btn-success btn-lg w-100 mt-3">💳 Confirmar Reserva</button>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script>
        const fpEntrada = flatpickr("#fechaEntrada", { locale: "es", minDate: "today", dateFormat: "Y-m-d", onChange: function(_, d) { fpSalida.set('minDate', d); } });
        const fpSalida = flatpickr("#fechaSalida", { locale: "es", minDate: "today", dateFormat: "Y-m-d" });
        let habitacionSeleccionada = null, totalSeleccionado = 0;
        
        const datosPagoInfo = {
            solo_reserva: `<strong>📝 Reserva Sin Pago:</strong><br>⏰ Tiene <strong>40 minutos</strong> para pagar.<br>Pasado ese tiempo, se cancela automáticamente.`,
            zelle: `<strong>💵 Zelle:</strong><br>Titular: Demo Posadas C.A.<br>Email: pagos@demo-posadas.com`,
            binance: `<strong>₿ Binance:</strong><br>ID: 123456789<br>Red BSC (BEP20) o TRC20`,
            transferencia: `<strong>🏦 Transferencia:</strong><br>Banco: Internacional<br>Cuenta: 0123-4567-89`,
            efectivo: `<strong>💵 Efectivo:</strong><br>Acérquese a nuestra oficina.<br>Dirección: Calle Principal #123`
        };
        
        function mostrarDatosPago() {
            const metodo = document.getElementById('metodoPago').value;
            const div = document.getElementById('datosPago');
            const divComp = document.getElementById('divComprobante');
            const file = document.getElementById('comprobanteFile');
            if (metodo && datosPagoInfo[metodo]) { div.innerHTML = datosPagoInfo[metodo]; div.style.display = 'block'; }
            else { div.style.display = 'none'; }
            if (metodo === 'efectivo' || metodo === 'solo_reserva') { file.removeAttribute('required'); divComp.style.opacity = '0.5'; }
            else { file.setAttribute('required', 'required'); divComp.style.opacity = '1'; }
        }
        
        function buscarDisponibilidad() {
            const entrada = document.getElementById('fechaEntrada').value;
            const salida = document.getElementById('fechaSalida').value;
            if (!entrada || !salida) { alert('⚠️ Selecciona fechas'); return; }
            document.getElementById('cargando').style.display = 'block';
            document.getElementById('resultados').innerHTML = '';
            fetch(`/api/disponibilidad/1?entrada=${entrada}&salida=${salida}`).then(r => r.json()).then(data => {
                document.getElementById('cargando').style.display = 'none';
                let html = '';
                if (data.length === 0) html = '<div class="col-12 text-center text-white mt-4"><h3>😔 No hay habitaciones disponibles</h3></div>';
                else {
                    html += '<h2 class="text-white text-center mb-4">🏨 Habitaciones Disponibles</h2>';
                    data.forEach(hab => {
                        const img = hab.imagen ? `/static/uploads/${hab.imagen}` : 'https://via.placeholder.com/400x250?text=Sin+Imagen';
                        const serv = hab.servicios.map(s => `<span class="servicio-icon">${s}</span>`).join(' ');
                        html += `<div class="col-md-6 col-lg-4"><div class="habitacion-card" onclick="abrirReserva(${hab.id},'${hab.nombre}',${hab.precio_total},'${hab.tipo}','${hab.camas||''}')"><img src="${img}"><div class="p-3"><div class="d-flex justify-content-between"><h5>${hab.nombre}</h5><span class="badge bg-primary">${hab.tipo}</span></div><p class="text-muted small">${hab.descripcion||''}</p><div class="mb-2">${serv}</div><div class="d-flex justify-content-between"><span class="precio-badge">$${hab.precio_total}</span><small>$${hab.precio_por_noche}/noche</small></div><small>👥 ${hab.capacidad} pers · 🛏️ ${hab.camas||'Consultar'}</small></div></div></div>`;
                    });
                }
                document.getElementById('resultados').innerHTML = html;
            }).catch(() => { document.getElementById('cargando').style.display = 'none'; });
        }
        
        function abrirReserva(id, nombre, precio, tipo, camas) {
            habitacionSeleccionada = id; totalSeleccionado = precio;
            document.getElementById('resumenHabitacion').innerHTML = `<strong>${nombre}</strong><br><small>${tipo} · ${camas}</small>`;
            document.getElementById('totalReserva').textContent = `$${precio}`;
            document.getElementById('localizadorExito').style.display = 'none';
            document.getElementById('formReserva').style.display = 'block';
            const adultos = parseInt(document.getElementById('adultos').value);
            const ninos = parseInt(document.getElementById('ninos').value);
            const total = adultos + ninos;
            let hHTML = '';
            for (let i = 1; i <= total; i++) {
                hHTML += `<div class="huesped-card"><h6>👤 Huésped ${i} ${i<=adultos?'(Adulto)':'(Niño)'}</h6><div class="row g-2"><div class="col-12"><input type="text" name="huesped_nombre_${i}" class="form-control form-control-sm" placeholder="Nombre *" required></div><div class="col-md-6"><select name="huesped_tipo_doc_${i}" class="form-select form-select-sm"><option value="cedula">Cédula</option><option value="pasaporte">Pasaporte</option></select></div><div class="col-md-6"><input type="text" name="huesped_documento_${i}" class="form-control form-control-sm" placeholder="N° Doc *" required></div><div class="col-md-6"><input type="tel" name="huesped_telefono_${i}" class="form-control form-control-sm" placeholder="Teléfono"></div><div class="col-md-6"><input type="email" name="huesped_email_${i}" class="form-control form-control-sm" placeholder="Email"></div></div></div>`;
            }
            document.getElementById('huespedesContainer').innerHTML = hHTML;
            document.getElementById('metodoPago').value = '';
            document.getElementById('datosPago').style.display = 'none';
            document.getElementById('comprobanteFile').setAttribute('required', 'required');
            document.getElementById('divComprobante').style.opacity = '1';
            document.getElementById('modalReserva').classList.add('active');
        }
        
        function cerrarModal() { 
            document.getElementById('modalReserva').classList.remove('active'); 
            document.getElementById('localizadorExito').style.display = 'none';
            document.getElementById('formReserva').style.display = 'block';
        }
        
        document.getElementById('formReserva').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const adultos = parseInt(document.getElementById('adultos').value);
            const ninos = parseInt(document.getElementById('ninos').value);
            const total = adultos + ninos;
            const metodo = document.getElementById('metodoPago').value;
            const huespedes = [];
            for (let i = 1; i <= total; i++) { 
                huespedes.push({ 
                    nombre: formData.get(`huesped_nombre_${i}`)||'', 
                    tipo_documento: formData.get(`huesped_tipo_doc_${i}`)||'cedula', 
                    documento: formData.get(`huesped_documento_${i}`)||'', 
                    telefono: formData.get(`huesped_telefono_${i}`)||'', 
                    email: formData.get(`huesped_email_${i}`)||'', 
                    tipo: i<=adultos?'adulto':'niño' 
                }); 
            }
            formData.append('datos_huespedes', JSON.stringify(huespedes));
            formData.append('habitacion_id', habitacionSeleccionada);
            formData.append('fecha_entrada', document.getElementById('fechaEntrada').value);
            formData.append('fecha_salida', document.getElementById('fechaSalida').value);
            formData.append('adultos', adultos); formData.append('ninos', ninos); formData.append('metodo_pago', metodo);
            formData.append('cliente_cedula', document.getElementById('tipoDocumento').value + ':' + document.getElementById('cedulaCliente').value);
            if (metodo === 'efectivo' || metodo === 'solo_reserva') formData.delete('comprobante');
            
            fetch('/api/reservas', { method: 'POST', body: formData }).then(r => r.json()).then(data => {
                if (data.reserva_id) {
                    document.getElementById('formReserva').style.display = 'none';
                    document.getElementById('localizadorCodigo').textContent = data.localizador;
                    document.getElementById('localizadorExito').style.display = 'block';
                    let msg = '✅ ¡Reserva creada exitosamente!\n\n🔑 TU LOCALIZADOR: ' + data.localizador + '\n\n📌 GUARDA ESTE CÓDIGO\n\nTotal: $' + data.total;
                    if (metodo === 'solo_reserva') msg += '\n\n⏰ Tienes 40 minutos para confirmar el pago';
                    alert(msg);
                    setTimeout(() => { cerrarModal(); buscarDisponibilidad(); }, 5000);
                } else { alert('❌ ' + (data.error || 'Error al crear la reserva')); }
            }).catch(() => alert('❌ Error de conexión'));
        });
        
        document.getElementById('modalReserva').addEventListener('click', function(e) { if (e.target === this) cerrarModal(); });
        
        function consultarReserva() {
            const localizador = document.getElementById('buscarLocalizador').value.trim().toUpperCase();
            if (!localizador || localizador.length < 6) { alert('⚠️ Ingresa un localizador válido de 6 caracteres'); return; }
            fetch('/api/consultar-reserva/' + localizador).then(r => r.json()).then(data => {
                const div = document.getElementById('resultadoConsulta');
                div.style.display = 'block';
                if (data.error) { div.innerHTML = '<div class="alert alert-danger">❌ ' + data.error + '</div>'; return; }
                const estadoColor = data.estado === 'confirmada' ? 'success' : data.estado === 'pendiente' ? 'warning' : data.estado === 'cancelada' ? 'danger' : 'info';
                div.innerHTML = `
                    <div class="alert alert-${estadoColor}">
                        <h5>🔑 Reserva: <strong>${data.localizador}</strong></h5><hr>
                        <p><strong>👤 Cliente:</strong> ${data.cliente_nombre}</p>
                        <p><strong>🏨 Habitación:</strong> ${data.habitacion}</p>
                        <p><strong>📅 Check-in:</strong> ${data.fecha_entrada}</p>
                        <p><strong>📅 Check-out:</strong> ${data.fecha_salida}</p>
                        <p><strong>👥 Huéspedes:</strong> ${data.adultos} adultos, ${data.ninos} niños</p>
                        <p><strong>💰 Total:</strong> $${data.total}</p>
                        <p><strong>💳 Pago:</strong> ${data.metodo_pago || 'No especificado'}</p>
                        <p><strong>📊 Estado:</strong> <span class="badge bg-${estadoColor}">${data.estado}</span></p>
                        <p><small>📅 Reservado el: ${data.fecha_reserva}</small></p>
                    </div>`;
            }).catch(() => { 
                document.getElementById('resultadoConsulta').style.display = 'block';
                document.getElementById('resultadoConsulta').innerHTML = '<div class="alert alert-danger">❌ Error de conexión</div>';
            });
        }
    </script>
</body>
</html>
